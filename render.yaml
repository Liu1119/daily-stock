# Render 部署配置文件
# 参考文档: https://render.com/docs/yaml-spec

services:
  - type: web
    name: daily-stock-analysis
    runtime: python
    plan: free
    buildCommand: |
      # 安装系统依赖
      apt-get update && apt-get install -y wkhtmltopdf
      # 安装Python依赖（使用--no-cache-dir避免只读文件系统问题）
      pip install --no-cache-dir -r requirements.txt
      # 构建前端
      cd apps/dsa-web && npm install && npm run build && cd ../..
    startCommand: python main.py --webui-only
    envVars:
      - key: AGENT_MODE
        value: true
      - key: AGENT_MAX_STEPS
        value: 30
      - key: AGENT_SKILLS
        value: bull_trend,ma_golden_cross,volume_breakout,shrink_pullback
      - key: DEEPSEEK_API_KEY
        value: sk-abfc7c6b300a4ae7b1d0d412a73f7853
      - key: TAVILY_API_KEYS
        value: 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
      - key: FEISHU_WEBHOOK_URL
        value: https://open.feishu.cn/open-apis/bot/v2/hook/d6930274-cf9f-48d9-80d9-b1f735c43fc2
      - key: STOCK_LIST
        value: 600519,hk00700,AAPL
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: WEBUI_AUTO_BUILD
        value: false
    healthCheckPath: /api/health
    disk:
      name: daily-stock-analysis-storage
      mountPath: /data
      sizeGB: 1
