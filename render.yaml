# Render 部署配置文件
# 参考文档: https://render.com/docs/yaml-spec

services:
  - type: web
    name: daily-stock-analysis
    runtime: python
    plan: free
    buildCommand: |
      # 安装系统依赖
      apt-get update && apt-get install -y wkhtmltopdf curl
      # 安装Rust（tiktoken需要）
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      # 设置CARGO_HOME到可写目录
      export CARGO_HOME=/tmp/cargo
      export PATH="$CARGO_HOME/bin:$PATH"
      # 安装Python依赖（使用--no-cache-dir避免只读文件系统问题）
      pip install --no-cache-dir -r requirements.txt
      # 构建前端
      cd apps/dsa-web && npm install && npm run build && cd ../..
    startCommand: python main.py --webui-only
    envVars:
      - key: AGENT_MODE
        value: true
      - key: AGENT_MAX_STEPS
        value: 10
      - key: AGENT_SKILLS
        value: bull_trend,ma_golden_cross,volume_breakout,shrink_pullback
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TAVILY_API_KEYS
        sync: false
      - key: STOCK_LIST
        value: 600519,hk00700,AAPL
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: WEBUI_AUTO_BUILD
        value: false
    healthCheckPath: /api/v1/health
    disk:
      name: daily-stock-analysis-storage
      mountPath: /data
      sizeGB: 1
